version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: cyberwatch-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=cyberwatch123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n

  postgres:
    image: postgres:15
    container_name: cyberwatch-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=cyberwatch
      - POSTGRES_PASSWORD=cyberwatch123
      - POSTGRES_DB=cyberwatch
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  n8n_data:
  postgres_data: